<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoria</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/skeuomorphic.css">
  <link rel="stylesheet" href="styles/views.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <span>Memoria</span>
      </div>
    </header>

    <main class="app-main">
      <nav class="sidebar">
        <div class="sidebar-nav">
          <button class="nav-item active" data-view="search">
            <span class="icon">🔍</span>
            <span>Search</span>
          </button>
          <button class="nav-item" data-view="timeline">
            <span class="icon">📅</span>
            <span>Timeline</span>
          </button>
          <button class="nav-item" data-view="graph">
            <span class="icon">🔗</span>
            <span>Memory Graph</span>
          </button>
          <button class="nav-item" data-view="settings">
            <span class="icon">⚙️</span>
            <span>Settings</span>
          </button>
        </div>
      </nav>

      <div class="content-area">
        <div id="view-search" class="view-container"></div>
        <div id="view-timeline" class="view-container hidden"></div>
        <div id="view-graph" class="view-container hidden"></div>
        <div id="view-preview" class="view-container hidden"></div>
        <div id="view-settings" class="view-container hidden"></div>
      </div>
    </main>

    <footer class="status-bar">
      <div class="status-left">
        <div class="recording-indicator">
          <div class="recording-dot"></div>
          <span>Recording</span>
        </div>
        <span>•</span>
        <span><span class="activity-count">0</span> memories</span>
        <span>•</span>
        <span><span class="pending-count">0</span> pending</span>
      </div>
      <div class="status-right">
        <span>Cmd+Shift+D for Debug</span>
      </div>
    </footer>
  </div>

  <div id="debug-panel" class="debug-panel hidden">
    <h3>Developer Metrics</h3>
    <div class="debug-grid">
      <div class="debug-item">
        <span class="debug-label">Events</span>
        <span class="debug-value" data-metric="events">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Screenshots</span>
        <span class="debug-value" data-metric="screenshots">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">OCR</span>
        <span class="debug-value" data-metric="ocr">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Embeddings</span>
        <span class="debug-value" data-metric="embeddings">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Searches</span>
        <span class="debug-value" data-metric="searches">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Queue</span>
        <span class="debug-value" data-metric="queue">0</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Latency</span>
        <span class="debug-value" data-metric="latency">0ms</span>
      </div>
      <div class="debug-item">
        <span class="debug-label">Uptime</span>
        <span class="debug-value" data-metric="uptime">0h 0m</span>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
